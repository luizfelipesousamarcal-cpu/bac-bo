<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Estatístico Bac Bo</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>Painel Estatístico</h1>
</header>

<div class="container">

<div class="card">

<h2>Registrar Resultado</h2>

<div class="buttons">

<button onclick="addResult('PLAYER')">PLAYER</button>

<button onclick="addResult('BANKER')">BANKER</button>

<button onclick="addResult('TIE')">TIE</button>

</div>

</div>

<div class="card">

<h2>Estatísticas</h2>

<p>Player: <span id="player">0</span></p>

<p>Banker: <span id="banker">0</span></p>

<p>Tie: <span id="tie">0</span></p>

</div>

<div class="card">

<h2>Últimos Resultados</h2>

<ul id="history"></ul>

</div>

<div class="card">

<h2>Gráfico</h2>

<canvas id="chart"></canvas>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
