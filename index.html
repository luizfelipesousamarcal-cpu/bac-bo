<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Estatístico Bac Bo</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>📊 Painel Estatístico Bac Bo</h1>

</header>

<div class="container">

<div class="card">

<h2>Registrar Resultado</h2>

<div class="buttons">

<button onclick="addResult('PLAYER')">PLAYER</button>

<button onclick="addResult('BANKER')">BANKER</button>

<button onclick="addResult('TIE')">TIE</button>

</div>

<button onclick="limparHistorico()">

🗑️ Limpar Histórico

</button>

</div><div class="card">

<h2>📊 Estatísticas</h2>

<p>PLAYER: <span id="player">0</span></p>

<p>BANKER: <span id="banker">0</span></p>

<p>TIE: <span id="tie">0</span></p>

</div>

<div class="card">

<h2>🎯 Sugestão</h2>

<h1 id="signal">Aguardando dados...</h1>

<p>Confiança</p>

<div class="progress">

<div id="confidenceBar"></div>

</div>

<p id="confidenceText">0%</p>

<h3>Motivos</h3>

<ul id="signalReasons">

<li>Aguardando dados...</li>

</ul>

</div>

<div class="card">

<h2>📜 Histórico</h2>

<ul id="history"></ul>

</div><div class="card">

<h2>📈 Gráfico</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>📋 Análise</h2>

<p>Rodadas: <span id="analiseRodadas">0</span></p>

<p>Sequência: <span id="sequenciaAtual">-</span></p>

<p id="statusAnalise">⚪ Aguardando resultados...</p>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
